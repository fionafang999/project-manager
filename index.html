<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --accent: #007aff;
            --accent-light: #e8f2ff;
            --text: #1c1c1e;
            --sub: #6e6e73;
            --border: #e5e5ea;
            --success: #34c759;
            --warning: #ff9500;
            --danger: #ff3b30;
            --right-w: 272px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            height: 52px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
            flex-shrink: 0;
        }
        .header h1 { font-size: 15px; font-weight: 700; flex: 1; }
        .header-date { font-size: 12px; color: var(--sub); }
        .sync-status {
            font-size: 11px; padding: 3px 10px; border-radius: 10px;
            font-weight: 500; flex-shrink: 0;
        }
        .sync-status.syncing { background: #fff6e0; color: #c47b00; }
        .sync-status.synced  { background: #edfaed; color: #1a7a1a; }
        .sync-status.error   { background: #ffeeed; color: #c00; }
        .sync-status.offline { background: #f2f2f7; color: #6e6e73; }

        /* Setup modal */
        .setup-modal {
            background: white; border-radius: 20px; padding: 32px;
            width: 480px; max-width: 92vw;
            box-shadow: 0 24px 64px rgba(0,0,0,0.2);
            text-align: center;
        }
        .setup-modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .setup-modal p  { font-size: 14px; color: var(--sub); margin-bottom: 20px; line-height: 1.6; }

        /* ── Body ── */
        .body { display: flex; flex: 1; overflow: hidden; }

        /* ── Left col ── */
        .main-col { flex: 1; overflow-y: auto; padding: 20px 20px 60px; min-width: 0; }
        .col-top {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .col-top h2 {
            font-size: 11px; font-weight: 700; color: var(--sub);
            text-transform: uppercase; letter-spacing: 0.7px;
        }

        /* ── Main task card ── */
        .task-card {
            background: var(--card);
            border-radius: 14px;
            border: 1px solid var(--border);
            margin-bottom: 14px;
            overflow: hidden;
        }
        .task-card.open { box-shadow: 0 4px 24px rgba(0,0,0,0.07); }

        .task-header {
            padding: 15px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
        }
        .task-header:hover { background: #fafafa; }

        .chevron {
            font-size: 10px; color: var(--sub);
            transition: transform 0.2s; flex-shrink: 0; width: 14px;
        }
        .task-card.open .chevron { transform: rotate(90deg); }

        .task-info { flex: 1; min-width: 0; }
        .task-title {
            font-size: 15px; font-weight: 600; margin-bottom: 7px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .task-progress-row { display: flex; align-items: center; gap: 9px; }
        .pbar { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
        .pbar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
        .pct { font-size: 12px; font-weight: 600; color: var(--accent); min-width: 30px; text-align: right; }
        .sub-count { font-size: 11px; color: var(--sub); white-space: nowrap; }

        .task-btns { display: flex; gap: 6px; flex-shrink: 0; }

        /* ── Task body ── */
        .task-body { display: none; border-top: 1px solid var(--border); }
        .task-card.open .task-body { display: block; }

        .task-desc {
            padding: 12px 18px;
            font-size: 13px; color: var(--sub); line-height: 1.5;
            border-bottom: 1px solid var(--border);
        }

        .task-start-date {
            padding: 8px 18px;
            font-size: 12px; color: var(--sub);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 6px;
        }
        .task-start-date span { font-weight: 600; color: var(--text); }

        /* ── Big subtask (大支线) ── */
        .big-sub {
            border-bottom: 1px solid var(--border);
        }
        .big-sub:last-of-type { border-bottom: none; }

        .big-sub-header {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 18px;
            cursor: pointer;
            user-select: none;
        }
        .big-sub-header:hover { background: #fafafa; }

        .big-chevron {
            font-size: 9px; color: var(--sub);
            transition: transform 0.18s; flex-shrink: 0; width: 12px;
        }
        .big-sub.open .big-chevron { transform: rotate(90deg); }

        .big-sub-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--accent); flex-shrink: 0;
        }

        .big-sub-name {
            font-size: 14px; font-weight: 600; flex: 1; min-width: 0;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .big-sub-meta { font-size: 11px; color: var(--sub); white-space: nowrap; }

        .big-sub-acts { display: flex; gap: 5px; flex-shrink: 0; }

        /* ── Small to-dos ── */
        .todo-list {
            display: none;
            padding: 0 18px 10px 42px;
        }
        .big-sub.open .todo-list { display: block; }

        .todo-item {
            display: flex; align-items: flex-start; gap: 9px;
            padding: 7px 0;
            border-bottom: 1px solid #f0f0f5;
        }
        .todo-item:last-child { border-bottom: none; }

        .todo-check {
            width: 18px; height: 18px; border-radius: 50%;
            border: 2px solid var(--border);
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0; margin-top: 1px;
            transition: all 0.15s; font-size: 10px; color: transparent;
        }
        .todo-check:hover { border-color: var(--success); }
        .todo-check.done { background: var(--success); border-color: var(--success); color: white; }

        .todo-content { flex: 1; min-width: 0; }
        .todo-title { font-size: 13px; line-height: 1.4; color: var(--text); }
        .todo-item.done .todo-title { text-decoration: line-through; color: var(--sub); }
        .todo-meta { display: flex; gap: 5px; margin-top: 3px; flex-wrap: wrap; }

        .tag {
            display: inline-flex; align-items: center;
            padding: 2px 7px; border-radius: 7px;
            font-size: 11px; font-weight: 500;
        }
        .tag-day { background: #e8f2ff; color: #0066cc; }
        .tag-owner { background: #edfaed; color: #1a7a1a; }

        .ghost-del {
            background: none; border: none; color: #c7c7cc;
            cursor: pointer; font-size: 15px; line-height: 1;
            padding: 1px 3px; opacity: 0;
            transition: opacity 0.12s; flex-shrink: 0;
        }
        .todo-item:hover .ghost-del,
        .big-sub-header:hover .ghost-del,
        .skill-item:hover .ghost-del,
        .reminder-item:hover .ghost-del { opacity: 1; }

        .todo-add {
            display: flex; align-items: center; gap: 6px;
            color: var(--accent); font-size: 12px; font-weight: 500;
            cursor: pointer; padding: 7px 0 2px;
            background: none; border: none; font-family: inherit;
        }
        .todo-add:hover { opacity: 0.7; }

        .big-sub-add {
            display: flex; align-items: center; gap: 7px;
            color: var(--sub); font-size: 13px; font-weight: 500;
            cursor: pointer; padding: 12px 18px;
            background: none; border: none; font-family: inherit;
            border-top: 1px solid var(--border);
            width: 100%;
        }
        .big-sub-add:hover { color: var(--accent); background: #fafafa; }

        /* ── Right col ── */
        .right-col {
            width: var(--right-w); border-left: 1px solid var(--border);
            background: var(--card); display: flex; flex-direction: column;
            overflow-y: auto; flex-shrink: 0; padding: 16px;
        }
        .panel-sec { margin-bottom: 26px; }
        .panel-head {
            font-size: 11px; font-weight: 700; color: var(--sub);
            text-transform: uppercase; letter-spacing: 0.7px;
            margin-bottom: 10px; display: flex; align-items: center;
            justify-content: space-between;
        }

        .skill-item {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 9px 11px; background: var(--bg);
            border-radius: 9px; margin-bottom: 5px;
            border-left: 3px solid var(--warning);
        }
        .skill-item.high { border-color: var(--danger); }
        .skill-item.medium { border-color: var(--warning); }
        .skill-item.low { border-color: var(--success); }
        .skill-name { font-size: 13px; font-weight: 500; flex: 1; line-height: 1.4; }
        .skill-pri { font-size: 11px; color: var(--sub); margin-top: 1px; }

        .reminder-item {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 9px 11px; background: var(--bg);
            border-radius: 9px; margin-bottom: 5px;
        }
        .reminder-text { font-size: 13px; flex: 1; line-height: 1.5; }
        .reminder-item.done .reminder-text { text-decoration: line-through; color: var(--sub); }

        .empty-hint { text-align: center; padding: 12px; font-size: 12px; color: var(--sub); }

        /* ── Buttons ── */
        .btn {
            padding: 5px 11px; border-radius: 7px; border: none;
            font-size: 12px; font-weight: 500; cursor: pointer;
            font-family: inherit; transition: opacity 0.12s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-danger { background: var(--danger); color: white; }

        .icon-btn {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--accent); border: none; color: white;
            font-size: 15px; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: opacity 0.12s, transform 0.1s;
        }
        .icon-btn:hover { opacity: 0.85; transform: scale(1.05); }
        .icon-btn.sm { width: 19px; height: 19px; font-size: 13px; }

        .text-btn {
            background: none; border: none; cursor: pointer;
            font-family: inherit; color: var(--accent);
            font-size: 12px; font-weight: 500; padding: 2px 4px;
            transition: opacity 0.12s;
        }
        .text-btn:hover { opacity: 0.7; }

        /* ── Modal ── */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.32); z-index: 100;
            align-items: center; justify-content: center;
        }
        .overlay.show { display: flex; }
        .modal {
            background: white; border-radius: 18px; padding: 24px;
            width: 440px; max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
        }
        .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
        .fg { margin-bottom: 13px; }
        .fg label {
            display: block; font-size: 11px; font-weight: 700; color: var(--sub);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px;
        }
        .fg input, .fg textarea, .fg select {
            width: 100%; padding: 8px 11px; border: 1.5px solid var(--border);
            border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); background: white;
        }
        .fg input:focus, .fg textarea:focus, .fg select:focus { outline: none; border-color: var(--accent); }
        .fg textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
        .fg .err { color: var(--danger); font-size: 11px; margin-top: 3px; display: none; }
        .fg .err.show { display: block; }
        .modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 3px; }

        /* ── Progress log ── */
        .prog-entry {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 5px 8px; background: var(--bg);
            border-radius: 7px; margin-bottom: 5px; font-size: 12px;
        }
        .prog-entry-date { color: var(--accent); font-weight: 600; flex-shrink: 0; white-space: nowrap; }
        .prog-entry-note { color: var(--text); flex: 1; line-height: 1.4; }
        .prog-del { background:none;border:none;color:#c7c7cc;cursor:pointer;font-size:14px;padding:0 2px;opacity:0;transition:opacity 0.12s;flex-shrink:0; }
        .prog-entry:hover .prog-del { opacity:1; }

        .todo-prog-log {
            margin: 4px 0 2px 28px; border-left: 2px solid var(--border);
            padding-left: 10px;
        }
        .todo-prog-item {
            font-size: 11px; color: var(--sub); padding: 3px 0;
            display: flex; gap: 6px; line-height: 1.4;
        }
        .todo-prog-item-date { color: var(--accent); font-weight: 600; flex-shrink: 0; }
        .todo-edit-btn {
            background: none; border: none; cursor: pointer;
            color: var(--accent); font-size: 11px; padding: 2px 4px;
            opacity: 0; transition: opacity 0.12s; font-family: inherit;
        }
        .todo-item:hover .todo-edit-btn { opacity: 1; }

        /* ── Drag & drop ── */
        .task-card { cursor: default; transition: opacity 0.15s, box-shadow 0.15s; }
        .task-card.dragging { opacity: 0.45; box-shadow: none; }
        .task-card.drag-over-top { border-top: 2px solid var(--accent); }
        .task-card.drag-over-bot { border-bottom: 2px solid var(--accent); }
        .drag-handle {
            cursor: grab; color: #c7c7cc; font-size: 14px;
            padding: 0 4px; flex-shrink: 0; user-select: none;
            line-height: 1;
        }
        .drag-handle:active { cursor: grabbing; }
    </style>
</head>
<body>

<div class="header">
    <span style="font-size:20px">📋</span>
    <h1>项目管理</h1>
    <span class="header-date" id="dateLabel"></span>
    <span class="sync-status offline" id="syncStatus">⏳ 加载中</span>
</div>

<!-- Setup modal (shown when no token) -->
<div class="overlay" id="setupModal">
    <div class="setup-modal">
        <div style="font-size:40px;margin-bottom:12px">🔑</div>
        <h2>首次使用，请输入访问令牌</h2>
        <p>输入你的 GitHub Token，数据将自动同步到所有设备。<br>Token 仅保存在本设备，不会上传。</p>
        <div class="fg" style="text-align:left">
            <label>GitHub Token</label>
            <input id="setup_token" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx" style="font-family:monospace">
            <div class="err" id="setup_token_err">Token 无效，请重新输入</div>
        </div>
        <div style="margin-top:16px">
            <button class="btn btn-primary" style="width:100%;padding:10px" onclick="submitToken()">确认并开始使用</button>
        </div>
    </div>
</div>

<div class="body">
    <div class="main-col">
        <div class="col-top">
            <h2>主线任务</h2>
            <button class="icon-btn" onclick="openTaskModal(null)">+</button>
        </div>
        <div id="taskList"></div>
    </div>

    <div class="right-col">
        <div class="panel-sec">
            <div class="panel-head">
                备忘录
                <button class="icon-btn sm" onclick="openSkillModal(null)">+</button>
            </div>
            <div id="skillList"></div>
        </div>
        <div class="panel-sec">
            <div class="panel-head">
                重要提醒
                <button class="icon-btn sm" onclick="openReminderModal()">+</button>
            </div>
            <div id="reminderList"></div>
        </div>
    </div>
</div>

<!-- Task modal -->
<div class="overlay" id="taskModal">
    <div class="modal">
        <h3 id="taskModalTitle">添加主线任务</h3>
        <div class="fg">
            <label>任务名称 *</label>
            <input id="t_name" type="text" placeholder="例如：先稳现金流">
            <div class="err" id="t_name_err">请输入任务名称</div>
        </div>
        <div class="fg">
            <label>任务描述</label>
            <textarea id="t_desc" placeholder="这个任务的目标是什么？"></textarea>
        </div>
        <div class="fg">
            <label>开始时间</label>
            <input id="t_start" type="date">
        </div>
        <div class="modal-foot">
            <button class="btn btn-secondary" onclick="closeModal('taskModal')">取消</button>
            <button class="btn btn-primary" onclick="saveTask()">保存</button>
        </div>
    </div>
</div>

<!-- Big subtask modal -->
<div class="overlay" id="bigSubModal">
    <div class="modal">
        <h3>添加小支线</h3>
        <div class="fg">
            <label>支线名称 *</label>
            <input id="bs_name" type="text" placeholder="例如：客户开发、产品打磨...">
            <div class="err" id="bs_name_err">请输入支线名称</div>
        </div>
        <div class="fg">
            <label>负责人</label>
            <input id="bs_owner" type="text" placeholder="谁来负责这条支线？">
        </div>
        <div class="fg">
            <label>开始时间</label>
            <input id="bs_start" type="date">
        </div>
        <div class="modal-foot">
            <button class="btn btn-secondary" onclick="closeModal('bigSubModal')">取消</button>
            <button class="btn btn-primary" onclick="saveBigSub()">保存</button>
        </div>
    </div>
</div>

<!-- Todo modal -->
<div class="overlay" id="todoModal">
    <div class="modal" style="width:520px">
        <h3 id="todoModalTitle">添加小任务</h3>
        <div class="fg">
            <label>任务内容 *</label>
            <input id="td_title" type="text" placeholder="写下需要完成的具体事项...">
            <div class="err" id="td_title_err">请输入任务内容</div>
        </div>
        <div class="fg">
            <label>进度记录</label>
            <div id="td_prog_list" style="margin-bottom:8px"></div>
            <div style="display:flex;gap:8px;align-items:center">
                <input type="date" id="td_prog_date" style="flex:0 0 140px;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit">
                <input type="text" id="td_prog_note" placeholder="这天做了什么..." style="flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit">
                <button type="button" class="btn btn-secondary" onclick="addProgEntry()" style="flex-shrink:0">+ 添加</button>
            </div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-secondary" onclick="closeModal('todoModal')">取消</button>
            <button class="btn btn-primary" onclick="saveTodo()">保存</button>
        </div>
    </div>
</div>

<!-- Skill modal -->
<div class="overlay" id="skillModal">
    <div class="modal">
        <h3 id="skillModalTitle">添加需补足能力</h3>
        <div class="fg">
            <label>能力名称 *</label>
            <input id="sk_name" type="text" placeholder="例如：数据分析、客户谈判...">
            <div class="err" id="sk_name_err">请输入能力名称</div>
        </div>
        <div class="fg">
            <label>优先级</label>
            <select id="sk_pri">
                <option value="high">高 — 急需提升</option>
                <option value="medium">中 — 需要关注</option>
                <option value="low">低 — 长期培养</option>
            </select>
        </div>
        <div class="modal-foot">
            <button class="btn btn-secondary" onclick="closeModal('skillModal')">取消</button>
            <button class="btn btn-primary" onclick="saveSkill()">保存</button>
        </div>
    </div>
</div>

<!-- Reminder modal -->
<div class="overlay" id="reminderModal">
    <div class="modal">
        <h3>添加重要提醒</h3>
        <div class="fg">
            <label>提醒内容 *</label>
            <textarea id="rm_text" placeholder="写下需要记住的事..."></textarea>
            <div class="err" id="rm_text_err">请输入提醒内容</div>
        </div>
        <div class="modal-foot">
            <button class="btn btn-secondary" onclick="closeModal('reminderModal')">取消</button>
            <button class="btn btn-primary" onclick="saveReminder()">保存</button>
        </div>
    </div>
</div>

<script>
// ── Config ──
const GIST_ID   = '520b22fc52123dcc5a76ca8ebea09a9b';
const GIST_FILE = 'data.json';
const TOKEN_KEY = 'pm_github_token';
const CACHE_KEY = 'pm_data_cache';

// ── State ──
let db = { tasks: [], skills: [], reminders: [] };
let openTasks = new Set();
let openBigSubs = new Set();
let editTaskId = null, editSkillId = null;
let bigSubForTask = null;
let todoForTask = null, todoForBigSub = null;
let saveTimer = null;

// ── Token helpers ──
function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }

function setSyncStatus(state, text) {
    const el = document.getElementById('syncStatus');
    el.className = 'sync-status ' + state;
    el.textContent = text;
}

// ── GitHub Gist API ──
async function loadData() {
    const token = getToken();
    if (!token) { showOverlay('setupModal'); setSyncStatus('offline', '未登录'); return; }

    setSyncStatus('syncing', '⏳ 同步中');
    try {
        const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
        });
        if (res.status === 401) { showOverlay('setupModal'); setSyncStatus('error', '❌ Token 失效'); return; }
        const gist = await res.json();
        const raw  = gist.files[GIST_FILE]?.content;
        if (raw) {
            db = JSON.parse(raw);
            localStorage.setItem(CACHE_KEY, raw);
        }
        setSyncStatus('synced', '✅ 已同步');
    } catch(e) {
        // offline — use cache
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) { db = JSON.parse(cached); }
        setSyncStatus('offline', '📴 离线模式');
    }
    renderTasks(); renderSkills(); renderReminders();
}

function save() {
    // Cache immediately so UI stays snappy
    localStorage.setItem(CACHE_KEY, JSON.stringify(db));
    // Debounce cloud sync (1.5s)
    clearTimeout(saveTimer);
    saveTimer = setTimeout(syncToGist, 1500);
}

async function syncToGist() {
    const token = getToken();
    if (!token) return;
    setSyncStatus('syncing', '⏳ 同步中');
    try {
        const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            method: 'PATCH',
            headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify(db) } } })
        });
        setSyncStatus(res.ok ? 'synced' : 'error', res.ok ? '✅ 已同步' : '❌ 同步失败');
    } catch(e) {
        setSyncStatus('offline', '📴 离线模式');
    }
}

// ── Setup token ──
async function submitToken() {
    const token = document.getElementById('setup_token').value.trim();
    if (!token) return;
    document.getElementById('setup_token_err').classList.remove('show');
    // Verify token works
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        headers: { 'Authorization': `token ${token}` }
    });
    if (!res.ok) { document.getElementById('setup_token_err').classList.add('show'); return; }
    setToken(token);
    closeModal('setupModal');
    await loadData();
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// ── Date ──
function refreshDate() {
    const d = new Date(), days=['周日','周一','周二','周三','周四','周五','周六'];
    document.getElementById('dateLabel').textContent =
        `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${days[d.getDay()]}`;
}

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render all tasks ──
function renderTasks() {
    const el = document.getElementById('taskList');
    if (!db.tasks.length) {
        el.innerHTML = `<div style="text-align:center;padding:48px 0;color:var(--sub)">
            <div style="font-size:40px;margin-bottom:10px">📋</div>
            <div style="font-weight:600;margin-bottom:4px">暂无主线任务</div>
            <div style="font-size:12px">点击右上角 + 添加第一个任务</div>
        </div>`;
        return;
    }
    el.innerHTML = db.tasks.map(t => buildTaskCard(t)).join('');
}

function calcProgress(t) {
    let total = 0, done = 0;
    (t.bigSubs||[]).forEach(bs => {
        total += (bs.todos||[]).length;
        done  += (bs.todos||[]).filter(x => x.done).length;
    });
    return total === 0 ? 0 : Math.round(done / total * 100);
}

function fmtDate(d) {
    if (!d) return '';
    const [y,m,day] = d.split('-');
    return `${y}年${parseInt(m)}月${parseInt(day)}日`;
}

function buildTaskCard(t) {
    const isOpen = openTasks.has(t.id);
    let totalTodo = 0, doneTodo = 0;
    (t.bigSubs||[]).forEach(bs => {
        totalTodo += (bs.todos||[]).length;
        doneTodo  += (bs.todos||[]).filter(x => x.done).length;
    });
    const pct = calcProgress(t);
    const bigSubsHtml = (t.bigSubs||[]).map(bs => buildBigSub(t.id, bs)).join('');
    const descHtml = t.description ? `<div class="task-desc">${esc(t.description)}</div>` : '';
    const startHtml = t.startDate
        ? `<div class="task-start-date">开始时间：<span>${fmtDate(t.startDate)}</span></div>` : '';

    return `
<div class="task-card${isOpen?' open':''}" id="card-${t.id}"
    draggable="true"
    ondragstart="dragStart(event,'${t.id}')"
    ondragover="dragOver(event,'${t.id}')"
    ondragleave="dragLeave(event,'${t.id}')"
    ondrop="dragDrop(event,'${t.id}')"
    ondragend="dragEnd(event)">
    <div class="task-header" onclick="toggleTask('${t.id}')">
        <span class="drag-handle" title="拖拽排序">⠿</span>
        <span class="chevron">▶</span>
        <div class="task-info">
            <div class="task-title">${esc(t.title)}</div>
            <div class="task-progress-row">
                <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
                <span class="pct">${pct}%</span>
                <span class="sub-count">${doneTodo}/${totalTodo} 完成</span>
            </div>
        </div>
        <div class="task-btns" onclick="event.stopPropagation()">
            <button class="btn btn-secondary" onclick="openTaskModal('${t.id}')">编辑</button>
            <button class="btn btn-danger" onclick="deleteTask('${t.id}')">删除</button>
        </div>
    </div>
    <div class="task-body">
        ${descHtml}
        ${startHtml}
        ${bigSubsHtml}
        <button class="big-sub-add" onclick="openBigSubModal('${t.id}')">
            <span style="font-size:16px;color:var(--accent)">+</span> 添加小支线
        </button>
    </div>
</div>`;
}

function buildBigSub(taskId, bs) {
    const key = taskId + '_' + bs.id;
    const isOpen = openBigSubs.has(key);
    const done = (bs.todos||[]).filter(x => x.done).length;
    const total = (bs.todos||[]).length;

    const todosHtml = (bs.todos||[]).map(td => {
        const progHtml = (td.progress||[]).length ? `
            <div class="todo-prog-log">
                ${(td.progress||[]).map(p => `
                <div class="todo-prog-item">
                    <span class="todo-prog-item-date">${fmtDate(p.date)}</span>
                    <span>${esc(p.note)}</span>
                </div>`).join('')}
            </div>` : '';
        return `
        <div class="todo-item${td.done?' done':''}" id="td-${td.id}">
            <div class="todo-check${td.done?' done':''}" onclick="toggleTodo('${taskId}','${bs.id}','${td.id}')">${td.done?'✓':''}</div>
            <div class="todo-content">
                <div class="todo-title" style="display:flex;align-items:center;gap:6px">
                    <span>${esc(td.title)}</span>
                    <button class="todo-edit-btn" onclick="openEditTodoModal('${taskId}','${bs.id}','${td.id}')">编辑进度</button>
                </div>
                ${progHtml}
            </div>
            <button class="ghost-del" onclick="deleteTodo('${taskId}','${bs.id}','${td.id}')">×</button>
        </div>`;
    }).join('');

    return `
<div class="big-sub${isOpen?' open':''}" id="bs-${bs.id}">
    <div class="big-sub-header" onclick="toggleBigSub('${taskId}','${bs.id}')">
        <span class="big-chevron">▶</span>
        <span class="big-sub-dot"></span>
        <span class="big-sub-name">${esc(bs.name)}</span>
        ${bs.owner ? `<span class="big-sub-meta">${esc(bs.owner)}</span>` : ''}
        ${bs.startDate ? `<span class="big-sub-meta">· ${fmtDate(bs.startDate)}</span>` : ''}
        <span class="big-sub-meta" style="margin-left:4px">${done}/${total}</span>
        <div class="big-sub-acts" onclick="event.stopPropagation()">
            <button class="ghost-del" onclick="deleteBigSub('${taskId}','${bs.id}')">×</button>
        </div>
    </div>
    <div class="todo-list">
        ${todosHtml}
        <button class="todo-add" onclick="openTodoModal('${taskId}','${bs.id}')">
            <span style="font-size:15px">+</span> 添加小任务
        </button>
    </div>
</div>`;
}

// ── Toggle open/close ──
function toggleTask(id) {
    openTasks.has(id) ? openTasks.delete(id) : openTasks.add(id);
    renderTasks();
}
function toggleBigSub(taskId, bsId) {
    const key = taskId+'_'+bsId;
    openBigSubs.has(key) ? openBigSubs.delete(key) : openBigSubs.add(key);
    renderTasks();
}

// ── Task CRUD ──
function openTaskModal(id) {
    editTaskId = id;
    const t = id ? db.tasks.find(x => x.id===id) : null;
    document.getElementById('taskModalTitle').textContent = t ? '编辑主线任务' : '添加主线任务';
    document.getElementById('t_name').value = t ? t.title : '';
    document.getElementById('t_desc').value = t ? (t.description||'') : '';
    document.getElementById('t_start').value = t ? (t.startDate||'') : '';
    hideErr('t_name_err'); showOverlay('taskModal');
    setTimeout(() => document.getElementById('t_name').focus(), 100);
}
function saveTask() {
    const name = document.getElementById('t_name').value.trim();
    if (!name) { showErr('t_name_err'); document.getElementById('t_name').focus(); return; }
    hideErr('t_name_err');
    const desc = document.getElementById('t_desc').value.trim();
    const startDate = document.getElementById('t_start').value;
    if (editTaskId) {
        const t = db.tasks.find(x => x.id===editTaskId);
        if (t) { t.title=name; t.description=desc; t.startDate=startDate; }
    } else {
        const nid = uid();
        db.tasks.push({ id:nid, title:name, description:desc, startDate, bigSubs:[] });
        openTasks.add(nid);
    }
    save(); closeModal('taskModal'); renderTasks();
}
function deleteTask(id) {
    if (!confirm('确认删除这个主线任务？')) return;
    db.tasks = db.tasks.filter(x => x.id!==id);
    openTasks.delete(id);
    save(); renderTasks();
}

// ── Big sub CRUD ──
function openBigSubModal(taskId) {
    bigSubForTask = taskId;
    document.getElementById('bs_name').value = '';
    document.getElementById('bs_owner').value = '';
    document.getElementById('bs_start').value = '';
    hideErr('bs_name_err'); showOverlay('bigSubModal');
    setTimeout(() => document.getElementById('bs_name').focus(), 100);
}
function saveBigSub() {
    const name = document.getElementById('bs_name').value.trim();
    if (!name) { showErr('bs_name_err'); document.getElementById('bs_name').focus(); return; }
    hideErr('bs_name_err');
    const owner = document.getElementById('bs_owner').value.trim();
    const startDate = document.getElementById('bs_start').value;
    const t = db.tasks.find(x => x.id===bigSubForTask);
    if (t) {
        const nid = uid();
        if (!t.bigSubs) t.bigSubs = [];
        t.bigSubs.push({ id:nid, name, owner, startDate, todos:[] });
        openBigSubs.add(bigSubForTask+'_'+nid);
    }
    save(); closeModal('bigSubModal'); renderTasks();
}
function deleteBigSub(taskId, bsId) {
    const t = db.tasks.find(x => x.id===taskId);
    if (t) t.bigSubs = (t.bigSubs||[]).filter(x => x.id!==bsId);
    openBigSubs.delete(taskId+'_'+bsId);
    save(); renderTasks();
}

// ── Todo CRUD ──
let editingTodo = null; // { taskId, bsId, tdId } when editing existing
let tempProgEntries = [];

function renderTempProg() {
    const el = document.getElementById('td_prog_list');
    if (!tempProgEntries.length) { el.innerHTML = ''; return; }
    el.innerHTML = tempProgEntries.map((p, i) => `
        <div class="prog-entry">
            <span class="prog-entry-date">${fmtDate(p.date)}</span>
            <span class="prog-entry-note">${esc(p.note)}</span>
            <button class="prog-del" onclick="removeTempProg(${i})">×</button>
        </div>`).join('');
}

function addProgEntry() {
    const date = document.getElementById('td_prog_date').value;
    const note = document.getElementById('td_prog_note').value.trim();
    if (!date || !note) return;
    tempProgEntries.push({ id: uid(), date, note });
    document.getElementById('td_prog_date').value = '';
    document.getElementById('td_prog_note').value = '';
    renderTempProg();
    document.getElementById('td_prog_note').focus();
}

function removeTempProg(i) {
    tempProgEntries.splice(i, 1);
    renderTempProg();
}

function openTodoModal(taskId, bsId) {
    editingTodo = null;
    todoForTask = taskId; todoForBigSub = bsId;
    tempProgEntries = [];
    document.getElementById('todoModalTitle').textContent = '添加小任务';
    document.getElementById('td_title').value = '';
    document.getElementById('td_prog_date').value = '';
    document.getElementById('td_prog_note').value = '';
    renderTempProg();
    hideErr('td_title_err'); showOverlay('todoModal');
    setTimeout(() => document.getElementById('td_title').focus(), 100);
}

function openEditTodoModal(taskId, bsId, tdId) {
    const t = db.tasks.find(x => x.id===taskId);
    const bs = t && (t.bigSubs||[]).find(x => x.id===bsId);
    const td = bs && (bs.todos||[]).find(x => x.id===tdId);
    if (!td) return;
    editingTodo = { taskId, bsId, tdId };
    todoForTask = taskId; todoForBigSub = bsId;
    tempProgEntries = JSON.parse(JSON.stringify(td.progress||[]));
    document.getElementById('todoModalTitle').textContent = '编辑小任务';
    document.getElementById('td_title').value = td.title;
    document.getElementById('td_prog_date').value = '';
    document.getElementById('td_prog_note').value = '';
    renderTempProg();
    hideErr('td_title_err'); showOverlay('todoModal');
    setTimeout(() => document.getElementById('td_title').focus(), 100);
}

function saveTodo() {
    const title = document.getElementById('td_title').value.trim();
    if (!title) { showErr('td_title_err'); document.getElementById('td_title').focus(); return; }
    hideErr('td_title_err');
    // capture any unsaved inline entry
    const inlineDate = document.getElementById('td_prog_date').value;
    const inlineNote = document.getElementById('td_prog_note').value.trim();
    if (inlineDate && inlineNote) tempProgEntries.push({ id: uid(), date: inlineDate, note: inlineNote });

    const t = db.tasks.find(x => x.id===todoForTask);
    if (!t) return;
    const bs = (t.bigSubs||[]).find(x => x.id===todoForBigSub);
    if (!bs) return;

    if (editingTodo) {
        const td = (bs.todos||[]).find(x => x.id===editingTodo.tdId);
        if (td) { td.title = title; td.progress = tempProgEntries; }
    } else {
        if (!bs.todos) bs.todos = [];
        bs.todos.push({ id: uid(), title, done: false, progress: tempProgEntries });
    }
    save(); closeModal('todoModal'); renderTasks();
}

function toggleTodo(taskId, bsId, tdId) {
    const t = db.tasks.find(x => x.id===taskId);
    if (t) { const bs=(t.bigSubs||[]).find(x=>x.id===bsId);
        if (bs) { const td=(bs.todos||[]).find(x=>x.id===tdId); if (td) td.done=!td.done; } }
    save(); renderTasks();
}
function deleteTodo(taskId, bsId, tdId) {
    const t = db.tasks.find(x => x.id===taskId);
    if (t) { const bs=(t.bigSubs||[]).find(x=>x.id===bsId);
        if (bs) bs.todos=(bs.todos||[]).filter(x=>x.id!==tdId); }
    save(); renderTasks();
}

// ── Skills ──
function openSkillModal(id) {
    editSkillId = id;
    const s = id ? db.skills.find(x=>x.id===id) : null;
    document.getElementById('skillModalTitle').textContent = s ? '编辑能力' : '添加需补足能力';
    document.getElementById('sk_name').value = s ? s.title : '';
    document.getElementById('sk_pri').value = s ? s.priority : 'high';
    hideErr('sk_name_err'); showOverlay('skillModal');
    setTimeout(() => document.getElementById('sk_name').focus(), 100);
}
function saveSkill() {
    const name = document.getElementById('sk_name').value.trim();
    if (!name) { showErr('sk_name_err'); document.getElementById('sk_name').focus(); return; }
    hideErr('sk_name_err');
    const pri = document.getElementById('sk_pri').value;
    if (editSkillId) {
        const s = db.skills.find(x=>x.id===editSkillId);
        if (s) { s.title=name; s.priority=pri; }
    } else {
        db.skills.push({ id:uid(), title:name, priority:pri });
    }
    save(); closeModal('skillModal'); renderSkills();
}
function deleteSkill(id) {
    db.skills = db.skills.filter(x=>x.id!==id);
    save(); renderSkills();
}
function renderSkills() {
    const el = document.getElementById('skillList');
    if (!db.skills.length) { el.innerHTML='<div class="empty-hint">暂无记录</div>'; return; }
    const lbl = { high:'高', medium:'中', low:'低' };
    el.innerHTML = db.skills.map(s=>`
        <div class="skill-item ${s.priority}">
            <div style="flex:1;min-width:0">
                <div class="skill-name">${esc(s.title)}</div>
                <div class="skill-pri">优先级：${lbl[s.priority]}</div>
            </div>
            <button class="ghost-del" onclick="deleteSkill('${s.id}')">×</button>
        </div>`).join('');
}

// ── Reminders ──
function openReminderModal() {
    document.getElementById('rm_text').value='';
    hideErr('rm_text_err'); showOverlay('reminderModal');
    setTimeout(()=>document.getElementById('rm_text').focus(),100);
}
function saveReminder() {
    const text = document.getElementById('rm_text').value.trim();
    if (!text) { showErr('rm_text_err'); document.getElementById('rm_text').focus(); return; }
    hideErr('rm_text_err');
    db.reminders.push({ id:uid(), text, done:false });
    save(); closeModal('reminderModal'); renderReminders();
}
function toggleReminder(id) {
    const r = db.reminders.find(x=>x.id===id);
    if (r) r.done=!r.done;
    save(); renderReminders();
}
function deleteReminder(id) {
    db.reminders = db.reminders.filter(x=>x.id!==id);
    save(); renderReminders();
}
function renderReminders() {
    const el = document.getElementById('reminderList');
    if (!db.reminders.length) { el.innerHTML='<div class="empty-hint">暂无提醒</div>'; return; }
    el.innerHTML = db.reminders.map(r=>`
        <div class="reminder-item${r.done?' done':''}">
            <div class="todo-check${r.done?' done':''}" onclick="toggleReminder('${r.id}')" style="width:16px;height:16px;font-size:9px;margin-top:2px">${r.done?'✓':''}</div>
            <div class="reminder-text">${esc(r.text)}</div>
            <button class="ghost-del" onclick="deleteReminder('${r.id}')">×</button>
        </div>`).join('');
}

// ── Modal helpers ──
function showOverlay(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showErr(id) { document.getElementById(id).classList.add('show'); }
function hideErr(id) { document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.overlay').forEach(el =>
    el.addEventListener('click', e => { if(e.target===el) el.classList.remove('show'); })
);
document.addEventListener('keydown', e => {
    if (e.key==='Escape')
        document.querySelectorAll('.overlay.show').forEach(m=>m.classList.remove('show'));
});

// ── Drag & drop reorder ──
let dragId = null;

function dragStart(e, id) {
    dragId = id;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => { const el = document.getElementById('card-'+id); if (el) el.classList.add('dragging'); }, 0);
}

function dragOver(e, id) {
    if (!dragId || dragId === id) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const card = document.getElementById('card-'+id);
    if (!card) return;
    const rect = card.getBoundingClientRect();
    const mid  = rect.top + rect.height / 2;
    card.classList.toggle('drag-over-top', e.clientY < mid);
    card.classList.toggle('drag-over-bot', e.clientY >= mid);
}

function dragLeave(e, id) {
    const card = document.getElementById('card-'+id);
    if (card) { card.classList.remove('drag-over-top', 'drag-over-bot'); }
}

function dragDrop(e, targetId) {
    e.preventDefault();
    if (!dragId || dragId === targetId) return;
    const card = document.getElementById('card-'+targetId);
    const insertBefore = card && card.classList.contains('drag-over-top');
    card && card.classList.remove('drag-over-top', 'drag-over-bot');

    const fromIdx = db.tasks.findIndex(t => t.id === dragId);
    let   toIdx   = db.tasks.findIndex(t => t.id === targetId);
    if (fromIdx < 0 || toIdx < 0) return;

    const [moved] = db.tasks.splice(fromIdx, 1);
    toIdx = db.tasks.findIndex(t => t.id === targetId);
    db.tasks.splice(insertBefore ? toIdx : toIdx + 1, 0, moved);

    save(); renderTasks();
}

function dragEnd(e) {
    if (dragId) {
        const el = document.getElementById('card-'+dragId);
        if (el) el.classList.remove('dragging');
    }
    document.querySelectorAll('.task-card').forEach(c =>
        c.classList.remove('drag-over-top', 'drag-over-bot')
    );
    dragId = null;
}

// ── Init ──
refreshDate();
setInterval(refreshDate, 60000);
loadData();
</script>
